<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de ROI - Papo de Alcance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-color: #0f0f0f; /* Preto mais profundo para o Notion Dark */
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #00e676; /* Verde Neon/Performance */
            --accent-hover: #00c853;
            --success: #00e676;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid #333;
            border-top: 4px solid var(--accent);
        }

        h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 25px;
        }

        h2 strong {
            color: var(--text-main);
            font-weight: 800;
        }

        .section-title {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            font-weight: 700;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #bbb;
        }

        input {
            background-color: #242424;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #2a2a2a;
        }

        button {
            background-color: var(--accent);
            color: #000; /* Texto preto no botão verde dá mais contraste/leitura */
            border: none;
            padding: 15px;
            border-radius: 6px;
            width: 100%;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Área de Resultados */
        #results {
            display: none;
            text-align: center;
        }

        .result-box {
            background-color: #242424;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .result-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success);
        }

        .insight-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 25px;
            text-align: left;
            background-color: rgba(0, 230, 118, 0.05);
            padding: 18px;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
        }

        .btn-reset {
            background-color: transparent;
            border: 1px solid #444;
            color: var(--text-muted);
        }

        .btn-reset:hover {
            background-color: #222;
            color: white;
            border-color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="calculator">
        <h2><strong>PAPO DE ALCANCE</strong><br>Calculadora de ROI</h2>

        <div class="section-title">01 — Dados do Negócio</div>
        <div class="input-group">
            <label>Ticket Médio do Cliente (R$)</label>
            <input type="number" id="ticket" placeholder="Ex: 150" required>
        </div>
        <div class="input-group">
            <label>Meta de Clientes Novos / Mês</label>
            <input type="number" id="meta_clientes" placeholder="Ex: 30" required>
        </div>
        <div class="input-group">
            <label>Retenção Média (Meses)</label>
            <input type="number" id="retencao" placeholder="Ex: 3" value="1">
        </div>

        <div class="section-title">02 — Investimento Mensal</div>
        <div class="input-group">
            <label>Sua Gestão (R$)</label>
            <input type="number" id="gestao" placeholder="Ex: 747" required>
        </div>
        <div class="input-group">
            <label>Verba de Anúncio (R$)</label>
            <input type="number" id="anuncio" placeholder="Ex: 1000" required>
        </div>

        <button onclick="calcularROI()">▶ Calcular ROI</button>
    </div>

    <div id="results">
        <h2><strong>INSIGHTS</strong> DE PROJEÇÃO</h2>
        
        <div class="result-box">
            <div class="result-title">Faturamento Total (LTV)</div>
            <div class="result-value" id="faturamento_total">R$ 0,00</div>
        </div>

        <div class="insight-text" id="insight_message"></div>

        <button class="btn-reset" onclick="resetarCalculadora()">↺ Nova Consulta</button>
    </div>
</div>

<script>
    function calcularROI() {
        let ticket = parseFloat(document.getElementById('ticket').value) || 0;
        let metaClientes = parseFloat(document.getElementById('meta_clientes').value) || 0;
        let retencao = parseFloat(document.getElementById('retencao').value) || 1;
        let gestao = parseFloat(document.getElementById('gestao').value) || 0;
        let anuncio = parseFloat(document.getElementById('anuncio').value) || 0;

        if(ticket === 0 || metaClientes === 0) {
            alert("Preencha Ticket e Meta de Clientes.");
            return;
        }

        let investimentoTotal = gestao + anuncio;
        let faturamentoMensal = metaClientes * ticket;
        let faturamentoLTV = faturamentoMensal * retencao;
        let roi = ((faturamentoLTV - investimentoTotal) / investimentoTotal) * 100;
        let multiplicador = (faturamentoLTV / investimentoTotal).toFixed(2);

        const formataBR = (valor) => valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        document.getElementById('faturamento_total').innerText = formataBR(faturamentoLTV);

        let textoInsight = `
            <strong>Investimento:</strong> ${formataBR(investimentoTotal)}/mês.<br><br>
            Com ${metaClientes} novos clientes, você fatura <strong>${formataBR(faturamentoMensal)}</strong> no primeiro mês.<br><br>
            Pela retenção de ${retencao} meses, o retorno acumulado é de <strong>${formataBR(faturamentoLTV)}</strong>.<br><br>
            🚀 <strong>ROI de ${roi.toFixed(0)}%.</strong> Para cada R$ 1,00 investido, retornam <strong>R$ ${multiplicador}</strong>.
        `;

        document.getElementById('insight_message').innerHTML = textoInsight;
        document.getElementById('calculator').style.display = 'none';
        document.getElementById('results').style.display = 'block';
    }

    function resetarCalculadora() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('calculator').style.display = 'block';
    }
</script>

</body>
</html>
